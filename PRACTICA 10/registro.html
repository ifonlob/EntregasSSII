<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bocado Mágico | Registro</title>
    <link rel="stylesheet" href="./assets/css/styles.css">
    <script type="module" src="assets/js/firebase.js" defer></script>
</head>
<body>
<header class="cabecera">
    <a class="cabecera__enlace" href="./index.html">
        <img class="cabecera__logo" src="./assets/imgs/logo.png" alt="Volver">
    </a>
    <h1 class="cabecera__titulo">Bocado Mágico</h1>
    <nav class="cabecera__navegacion">
        <a class="navegacion__enlace" href="./index.html">Volver a inicio</a>
    </nav>
</header>

<main class="login">
    <h2 class="login__titulo">Crear Cuenta</h2>
    <form id="formularioRegistro" class="login__formulario">
        <label class="login__etiqueta">
            Nombre de Usuario
            <input id="registroUsuario" class="login__input" type="text" placeholder="Ej: antonio683" required>
        </label>
        <label class="login__etiqueta">
            Correo Electrónico
            <input id="registroEmail" class="login__input" type="email" placeholder="correo@ejemplo.com" required>
        </label>
        <label class="login__etiqueta">
            Contraseña
            <input id="registroPassword" class="login__input" type="password" required>
        </label>
        <button class="login__boton" type="submit">Registrarse</button>
        <p class="login__texto">
            ¿Ya tienes cuenta? <a href="./login.html" class="login__enlace">Inicia sesión aquí</a>
        </p>
    </form>
</main>

<footer class="pie-pagina">
    <p>&copy; 2026 Bocado Mágico.</p>
</footer>
</body>
</html>
