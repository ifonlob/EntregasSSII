version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: bocado_magico_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: bocadomagico
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: bocado_magico_backend
    restart: always
    environment:
      DB_HOST: db
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: bocadomagico
    depends_on:
      - db
    expose:
      - "3000"

  bocado-magico:
    build: .
    container_name: bocado_magico_app
    expose:
      - "443"
    restart: always
    depends_on:
      - backend

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: bocado_tunnel
    command: tunnel --url https://bocado-magico:443 --no-autoupdate --no-tls-verify
    restart: always
    depends_on:
      - bocado-magico

volumes:
  db_data:

