<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bocado Mágico | Acceso</title>
    <link rel="stylesheet" href="./assets/css/styles.css">
    <script type="module" src="assets/js/firebase.js" defer></script>
</head>
<body>
<header class="cabecera">
    <a class="cabecera__enlace" href="./index.html"><img class="cabecera__logo" src="./assets/imgs/logo.png" alt="Volver"></a>
    <h1 class="cabecera__titulo">Bocado Mágico</h1>
    <nav class="cabecera__navegacion">
        <a class="navegacion__enlace" href="./index.html">Volver a inicio</a>
    </nav>

</header>

<main class="login">
    <h2 class="login__titulo">Login</h2>
    <form id="formularioLogin" class="login__formulario">
        <label class="login__etiqueta">
            Correo electrónico
            <input id="usuario" class="login__input" type="email" placeholder="Ingresa tu correo" required>
        </label>
        <label class="login__etiqueta">
            Contraseña
            <input id="password" class="login__input" type="password" placeholder="Ingresa tu contraseña" required>
        </label>
        <button class="login__boton" type="submit">Acceder</button>
    </form>
</main>

<footer class="pie-pagina">
    <p>&copy; 2026 Bocado Mágico.</p>
</footer>
</body>
</html>
